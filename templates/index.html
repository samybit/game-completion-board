<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Completion Board</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: '#bb86fc',     /* Purple */
            success: '#03dac6',   /* Teal */
            surface: '#1e1e1e',   /* Dark card background */
            background: '#121212' /* Deepest background */
          }
        }
      }
    }
  </script>

  <style>
    /* The actual card dropping in */
    .slash-drop-animation {
      animation: cardDrop 0.6s cubic-bezier(0.25, 1, 0.5, 1) 0.2s backwards;
    }

    /* The glowing sword slash effect */
    .slash-drop-animation::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 150%;
      height: 3px;
      background: #ffffff;
      box-shadow: 0 0 10px #bb86fc, 0 0 20px #bb86fc, 0 0 40px #bb86fc;
      transform-origin: center;
      animation: swordSlash 0.4s ease-out forwards;
      z-index: 50;
      pointer-events: none;
    }

    @keyframes swordSlash {
      0% {
        transform: translate(-50%, -50%) rotate(-45deg) scaleX(0);
        opacity: 0;
      }

      50% {
        transform: translate(-50%, -50%) rotate(-45deg) scaleX(1);
        opacity: 1;
      }

      100% {
        transform: translate(-50%, -50%) rotate(-45deg) scaleX(0);
        opacity: 0;
      }
    }

    @keyframes cardDrop {
      0% {
        transform: translateY(-100px) rotate(5deg) scale(1.05);
        opacity: 0;
        filter: blur(4px);
      }

      50% {
        transform: translateY(15px) rotate(-1deg) scale(0.98);
        opacity: 1;
        filter: blur(0);
      }

      75% {
        transform: translateY(-5px) rotate(0.5deg) scale(1.01);
      }

      100% {
        transform: translateY(0) rotate(0) scale(1);
        opacity: 1;
      }
    }
  </style>

</head>

<body class="bg-background text-gray-200 font-sans antialiased min-h-screen p-4 md:p-8">

  <header class="max-w-6xl mx-auto mb-10 mt-4 flex justify-center">
    <h1
      class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-brand to-blue-500 tracking-tight drop-shadow-lg">
      Completion Board
    </h1>
  </header>

  <main class="max-w-6xl mx-auto">

    <div
      class="bg-surface p-6 md:p-8 rounded-2xl shadow-2xl border border-gray-800 mb-12 max-w-2xl mx-auto transition-all duration-300 hover:border-gray-700">
      <h2 class="text-2xl font-bold mb-6 text-gray-100 flex items-center gap-2">
        <svg class="w-6 h-6 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
        Track a New Game
      </h2>

      <form id="add-game-form" class="flex flex-col gap-5">
        <div class="flex flex-col gap-2 relative">
          <label for="game-title" class="text-sm font-semibold text-gray-400 uppercase tracking-wider">
            Game Title</label>

          <div class="relative flex items-center">
            <input type="text" id="game-title" placeholder="e.g., Sifu or Batman: Arkham" required
              class="px-4 py-3 bg-gray-900 text-white rounded-lg border border-gray-700 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-colors w-full placeholder-gray-600 pr-14">

            <img id="game-thumbnail" src="" alt=""
              class="absolute right-3 w-8 h-8 rounded object-cover hidden shadow-sm border border-gray-600 animate-pulse">
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <label for="game-achievements"
            class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Achievements</label>
          <textarea id="game-achievements" rows="3" placeholder="Defeat Fajar&#10;Defeat Sean" required
            class="px-4 py-3 bg-gray-900 text-white rounded-lg border border-gray-700 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-colors w-full resize-y placeholder-gray-600 leading-relaxed"></textarea>
        </div>

        <button type="submit"
          class="mt-2 bg-brand hover:bg-purple-400 text-gray-900 font-bold py-3 px-6 rounded-lg shadow-lg transform transition-all duration-200 hover:-translate-y-1 active:translate-y-0 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-brand">
          Add to Board
        </button>
      </form>
    </div>

    <div id="game-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    </div>

  </main>

  <div id="toast"
    class="fixed bottom-6 right-6 bg-success text-gray-900 px-6 py-4 rounded-lg font-bold shadow-2xl transform transition-all duration-300 translate-y-24 opacity-0 z-50 flex items-center gap-3">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
    </svg>
    <span id="toast-message">Success!</span>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>

</html>
